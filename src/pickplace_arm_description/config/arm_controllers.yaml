controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController
arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.5
gripper_controller:
  ros__parameters:
    joints:
      - left_finger_joint
      - right_finger_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["front_left_wheel_joint", "rear_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "rear_right_wheel_joint"]
    wheel_separation: 0.30
    wheels_per_side: 2
    wheel_radius: 0.05
    # Skid-steer scrub correction: a 4-wheel skid-steer physically rotates
    # less than the 2-wheel diff-drive odom model predicts (the fore/aft wheels
    # scrub sideways). Calibrated by rotating in place and comparing odom yaw
    # to Gazebo ground truth: odom over-reported rotation ~1.46x, so inflate
    # the effective track by that factor to make odom yaw match reality.
    wheel_separation_multiplier: 1.46
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.01]
    open_loop: false
    # The robot_localization EKF publishes odom->base_link (fusing this wheel
    # odom with the IMU), so the controller must not also publish that TF.
    enable_odom_tf: false
    cmd_vel_timeout: 0.5
    use_stamped_vel: false
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 0.8
        has_acceleration_limits: true
        max_acceleration: 1.5
    angular:
      z:
        has_velocity_limits: true
        max_velocity: 2.2
        has_acceleration_limits: true
        max_acceleration: 4.0
