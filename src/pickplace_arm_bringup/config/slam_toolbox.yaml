# slam_toolbox online async mapping for the pickplace_arm mobile base.
# diff_drive_controller already publishes odom -> base_link (enable_odom_tf:
# true); slam_toolbox supplies map -> odom by matching successive /scan frames.
slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # --- frames / topics ---
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    # --- general ---
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02   # 50 Hz map->odom
    map_update_interval: 2.0
    resolution: 0.05
    max_laser_range: 8.0             # matches the LIDAR's 8 m range
    minimum_time_between_scans: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    # --- scan matcher / motion filter ---
    use_scan_matching: true
    use_scan_barycenter: true
    # Match often so the skid-steer's odom drift is corrected before it grows
    # beyond the scan matcher's search window.
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    scan_buffer_size: 15
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # --- correlation ---
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # --- loop closure correlation ---
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # --- scan matcher penalties ---
    # Lower penalties => trust the laser scan match over the (drifty skid-steer)
    # odometry prior, so scan matching actually corrects the odom error.
    distance_variance_penalty: 0.3
    angle_variance_penalty: 0.3
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
