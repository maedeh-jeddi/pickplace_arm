# AMCL localization against the saved warehouse map. The map frame is anchored
# at the robot's mapping start pose (= world origin), so the robot's spawn pose
# (0,0,0) is the correct initial pose (set below, so no manual RViz estimate is
# needed). Differential motion model suits the 4-wheel skid-steer.
amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: scan

    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    laser_model_type: "likelihood_field"
    laser_max_range: 8.0
    laser_min_range: 0.15
    max_beams: 90
    min_particles: 500
    max_particles: 2000

    # motion noise (diff drive)
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2

    # likelihood field
    z_hit: 0.5
    z_rand: 0.5
    sigma_hit: 0.2
    laser_likelihood_max_dist: 2.0

    update_min_a: 0.2
    update_min_d: 0.25
    resample_interval: 1
    transform_tolerance: 1.0
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0
    tf_broadcast: true
